    const { useState, useEffect } = React;

function useWindowWidth(){
  const [w,setW]=useState(window.innerWidth);
  useEffect(()=>{
    const fn=()=>setW(window.innerWidth);
    window.addEventListener('resize',fn);
    return ()=>window.removeEventListener('resize',fn);
  },[]);
  return w;
}
// Per-trip storage: all "progress" keys are auto-prefixed with the active trip id.
// App-level keys (the trip list, settings) stay global via the allowlist below.
let ACTIVE_TRIP="";
const GLOBAL_KEYS=new Set(["trips","last-trip","trip-overrides","migrated-v2"]);
function nsKey(key){ return GLOBAL_KEYS.has(key)||!ACTIVE_TRIP ? key : ACTIVE_TRIP+"::"+key; }
function ls(key,def){
  try{const v=localStorage.getItem(nsKey(key));return v?JSON.parse(v):def;}catch(e){return def;}
}
function lsSet(key,val){
  try{localStorage.setItem(nsKey(key),JSON.stringify(val));}catch(e){}
}
// One-time migration: copy the original single-trip keys into the Spain trip's namespace.
(function migrateV2(){
  try{
    if(localStorage.getItem('migrated-v2')) return;
    ['bk-done','actual-spend','custom-dishes','custom-venues','custom-see','custom-notes',
     'stay-done','stay-hidden','see-done','see-hidden','eat-done','eat-hidden'].forEach(k=>{
      const v=localStorage.getItem(k);
      if(v!=null && localStorage.getItem('spain-portugal-2026::'+k)==null){
        localStorage.setItem('spain-portugal-2026::'+k,v);
      }
    });
    localStorage.setItem('migrated-v2','1');
  }catch(e){}
})();
function mapsUrl(name,addr){
  return 'https://maps.google.com/?q='+encodeURIComponent((addr||'')+' '+(name||''));
}

const DNAMES=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MNAMES=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
// Transit cities share a day with the next stop 芒聙聰 not in DAY_MAP
const TRANSIT_DAY={toledo:3, cordoba:5};
function cityDates(trip,cityId){
  if(!trip||!trip.startDate||!trip.dayMap) return "";
  const dayMap=trip.dayMap, transit=trip.transitDay||{};
  const start=new Date(trip.startDate+"T00:00:00");
  const cityDays=Object.entries(dayMap).filter(([,id])=>id===cityId).map(([d])=>Number(d));
  const d1=cityDays.length?Math.min(...cityDays):transit[cityId];
  const d2=cityDays.length?Math.max(...cityDays):transit[cityId];
  if(!d1) return "";
  const date1=new Date(start.getTime()+(d1-1)*86400000);
  const date2=new Date(start.getTime()+(d2-1)*86400000);
  const m1=MNAMES[date1.getMonth()], m2=MNAMES[date2.getMonth()];
  if(d1===d2) return `${DNAMES[date1.getDay()]} 脗路 ${m1} ${date1.getDate()}`;
  if(m1===m2) return `${DNAMES[date1.getDay()]}-${DNAMES[date2.getDay()]} 脗路 ${m1} ${date1.getDate()}-${date2.getDate()}`;
  return `${DNAMES[date1.getDay()]}-${DNAMES[date2.getDay()]} 脗路 ${m1} ${date1.getDate()}-${m2} ${date2.getDate()}`;
}

function BudgetOverlay({trip,onClose}){
  const BUDGET=trip.budget, CITIES=trip.cities;
  const C=2*Math.PI*52;
  let cum=0;
  const segs=BUDGET.cats.map(cat=>{
    const len=(cat.pct/100)*C;
    const offset=C*(1.25-cum/100);
    cum+=cat.pct;
    return {...cat,len,offset};
  });
  const maxCity=Math.max(...CITIES.map(c=>(c.cityCost&&c.cityCost.total)||0),1);
  const summary=BUDGET.summary||[["Total","$"+(BUDGET.total||0),""]];

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",zIndex:200,
      display:"flex",alignItems:"flex-end",justifyContent:"center",animation:"fadeIn .2s ease"}} onClick={onClose}>

        </div>

        {/* Totals */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:22}}>
          {summary.map(([l,v,s])=>(
            <div key={l} style={{background:C2,borderRadius:10,padding:"12px",textAlign:"center"}}>
              <div style={{fontSize:9,color:MUT,marginBottom:3,textTransform:"uppercase",letterSpacing:.5}}>{l}</div>
              <div style={{fontSize:17,fontWeight:800,color:TXT}}>{v}</div>
              <div style={{fontSize:9,color:MUT}}>{s}</div>
            </div>
          ))}
        </div>

              <circle key={i} cx="62" cy="62" r="52" fill="none"
                stroke={s.color} strokeWidth="16"
                strokeDasharray={`${s.len} ${C}`}
                strokeDashoffset={s.offset}
                transform="rotate(-90,62,62)"/>
            ))}
            <text x="62" y="57" textAnchor="middle" fontSize="13" fontWeight="800" fill={TXT}>{BUDGET.donutLabel||('$'+(BUDGET.onGround||0))}</text>
            <text x="62" y="72" textAnchor="middle" fontSize="9" fill={MUT}>{BUDGET.donutSub||"total"}</text>
          </svg>
          <div style={{flex:1}}>
            {BUDGET.cats.map(c=>(
              <div key={c.label} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:11,color:TXT}}>{c.label}</span>
                  <span style={{fontSize:11,color:c.color,fontWeight:700}}>${c.amount.toFixed(0)}</span>

                <span style={{fontSize:11,fontWeight:600,color:TXT}}>{c.name}</span>

function DaysTab({city}){
  if(!city.dayPlan||city.dayPlan.length===0){
    return <div style={{fontSize:12,color:MUT,lineHeight:1.7,padding:"8px 2px"}}>
      No day-by-day plan yet for {city.name}. Use the <b>See</b>, <b>Eat</b> and <b>Notes</b> tabs to build out what you'll do here.
    </div>;
  }
  return <div>
    {city.dayPlan.map((dp,i)=>(
      <div key={i} style={{marginBottom:20}}>
        <div style={{fontWeight:700,fontSize:13,color:city.country==="pt"?PT:ES,
          marginBottom:10,paddingBottom:6,borderBottom:`2px solid ${city.country==="pt"?PT:ES}22`}}>{dp.label}</div>

        ))}
      </div>
    ))}

}

function SeeTab({city,customSee,setCustomSee,seeDone,setSeeDone,seeHidden,setSeeHidden}){
  const [form,setForm]=useState({t:'',d:''});
  const [showRemovedSee,setShowRemovedSee]=useState(false);
  const cc2=city.country==="pt"?PT:ES;
  const myPlaces=customSee[city.id]||[];
  function addPlace(){
    if(!form.t.trim()) return;
    const next={...customSee,[city.id]:[...myPlaces,{t:form.t.trim(),d:form.d.trim()}]};
    setCustomSee(next); lsSet('custom-see',next); setForm({t:'',d:''});
  }
  function removePlace(idx){
    const next={...customSee,[city.id]:myPlaces.filter((_,j)=>j!==idx)};
    setCustomSee(next); lsSet('custom-see',next);
  }
  function toggleDone(k){
    const n={...seeDone,[k]:!seeDone[k]}; setSeeDone(n); lsSet('see-done',n);
  }
  function hideItem(k){
    const n={...seeHidden,[k]:true}; setSeeHidden(n); lsSet('see-hidden',n);
  }
  const inp={width:"100%",padding:"8px 10px",borderRadius:7,border:`1px solid ${BORDER}`,
    fontSize:12,marginBottom:7,background:CARD,color:TXT,outline:"none",boxSizing:"border-box"};
  return <div>
    {city.see.map((s,i)=>{
      const k=city.id+'-see-'+i;
      if(seeHidden[k]) return null;
      const done=!!seeDone[k];
      return(
        <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",
          marginBottom:10,paddingBottom:10,borderBottom:`1px solid ${BORDER}`}}>
          <input type="checkbox" checked={done} onChange={()=>toggleDone(k)}
            style={{marginTop:3,accentColor:cc2,flexShrink:0,width:14,height:14}}/>
          <div style={{flex:1,opacity:done?.5:1}}>
            <div style={{fontWeight:600,fontSize:13,color:done?MUT:TXT,
              textDecoration:done?"line-through":"none",marginBottom:2}}>{s.t}</div>
            <div style={{fontSize:12,color:"#666",lineHeight:1.6}}>{s.d}</div>
          </div>
          <button onClick={()=>hideItem(k)}
            style={{background:"none",border:"none",color:BORDER,cursor:"pointer",
              fontSize:18,lineHeight:1,padding:"0 4px",flexShrink:0}}
            title="Remove">脙聴</button>
        </div>
      );
    })}
    {myPlaces.length>0&&<div style={{marginTop:4}}>
      <div style={{fontWeight:700,fontSize:10,letterSpacing:1.2,color:cc2,textTransform:"uppercase",
        marginBottom:8,borderBottom:`2px solid ${cc2}33`,paddingBottom:5}}>My places</div>
      {myPlaces.map((p,idx)=>(
        <div key={idx} style={{marginBottom:10,paddingBottom:10,borderBottom:`1px solid ${BORDER}`,
          display:"flex",gap:8,alignItems:"flex-start"}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:13,color:TXT,marginBottom:2}}>{p.t}</div>
            {p.d&&<div style={{fontSize:12,color:"#666",lineHeight:1.6}}>{p.d}</div>}
          </div>
          <button onClick={()=>removePlace(idx)}
            style={{background:"none",border:"none",color:MUT,cursor:"pointer",fontSize:18,
              lineHeight:1,padding:"0 4px",flexShrink:0}}>脙聴</button>
        </div>
      ))}
    </div>}
    <div style={{marginTop:16,background:C2,borderRadius:10,padding:14,border:`1px solid ${BORDER}`}}>
      <div style={{fontSize:10,fontWeight:700,color:cc2,textTransform:"uppercase",
        letterSpacing:.5,marginBottom:10}}>+ Add a place</div>
      <input value={form.t} onChange={e=>setForm(f=>({...f,t:e.target.value}))}
        placeholder="Place name *" style={inp}/>
      <input value={form.d} onChange={e=>setForm(f=>({...f,d:e.target.value}))}
        placeholder="Notes (optional)" style={{...inp,marginBottom:10}}/>
      <button onClick={addPlace}
        style={{background:cc2,color:"#fff",border:"none",borderRadius:7,padding:"9px 0",
          fontSize:12,fontWeight:700,cursor:"pointer",width:"100%"}}>Add place</button>
    </div>
    {(()=>{
      const hidden=city.see.map((s,i)=>({k:city.id+'-see-'+i,label:s.t})).filter(x=>seeHidden[x.k]);
      if(!hidden.length) return null;
      return <div style={{marginTop:14}}>
        <button onClick={()=>setShowRemovedSee(o=>!o)}
          style={{display:"flex",justifyContent:"space-between",alignItems:"center",
            width:"100%",background:C2,border:`1px solid ${BORDER}`,borderRadius:8,
            padding:"8px 12px",cursor:"pointer",fontSize:12,color:MUT,fontWeight:600}}>
          <span>Removed places ({hidden.length})</span><span>{showRemovedSee?'芒聳虏':'芒聳录'}</span>
        </button>
        {showRemovedSee&&<div style={{marginTop:6,background:C2,borderRadius:10,padding:12,border:`1px solid ${BORDER}`}}>
          {hidden.map(({k,label})=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"7px 0",borderBottom:`1px solid ${BORDER}`}}>
              <span style={{fontSize:12,color:MUT}}>{label}</span>
              <button onClick={()=>{const n={...seeHidden};delete n[k];setSeeHidden(n);lsSet('see-hidden',n);}}
                style={{background:cc2,color:"#fff",border:"none",borderRadius:6,padding:"4px 10px",
                  fontSize:11,fontWeight:700,cursor:"pointer"}}>Restore</button>
            </div>
          ))}
        </div>}
      </div>;
    })()}
  </div>;
}

function EatTab({city,customDishes,setCustomDishes,customVenues,setCustomVenues,eatDone,setEatDone,eatHidden,setEatHidden}){
  const cc2=city.country==="pt"?PT:ES;
  const e=city.eat;
  const myDishes=customDishes[city.id]||[];
  const myVenues=customVenues[city.id]||{};
  const [showVF,setShowVF]=useState({});
  const [vf,setVF]=useState({});
  const [showDF,setShowDF]=useState(false);
  const [df,setDF]=useState({name:'',desc:''});
  const [showRemoved,setShowRemoved]=useState(false);
  function gvf(k){ return vf[k]||{n:'',addr:'',note:''}; }
  function svf(k,field,val){ setVF(f=>({...f,[k]:{...gvf(k),[field]:val}})); }
  function addVenue(k){
    const form=gvf(k); if(!form.n.trim()) return;
    if(k.startsWith('cd')){
      const di=parseInt(k.slice(2));
      const upd=myDishes.map((d,i)=>i===di?{...d,venues:[...d.venues,{n:form.n.trim(),addr:form.addr.trim(),note:form.note.trim()}]}:d);
      const next={...customDishes,[city.id]:upd}; setCustomDishes(next); lsSet('custom-dishes',next);
    } else {
      const existing=myVenues[k]||[];
      const next={...customVenues,[city.id]:{...myVenues,[k]:[...existing,{n:form.n.trim(),addr:form.addr.trim(),note:form.note.trim()}]}};
      setCustomVenues(next); lsSet('custom-venues',next);
    }
    setVF(f=>({...f,[k]:{n:'',addr:'',note:''}})); setShowVF(f=>({...f,[k]:false}));
  }
  function removeCustomVenue(k,idx){
    const next={...customVenues,[city.id]:{...myVenues,[k]:(myVenues[k]||[]).filter((_,j)=>j!==idx)}};
    setCustomVenues(next); lsSet('custom-venues',next);
  }
  function removeDishVenue(di,vi){
    const upd=myDishes.map((d,i)=>i===di?{...d,venues:d.venues.filter((_,j)=>j!==vi)}:d);
    const next={...customDishes,[city.id]:upd}; setCustomDishes(next); lsSet('custom-dishes',next);
  }
  function addDish(){
    if(!df.name.trim()) return;
    const next={...customDishes,[city.id]:[...myDishes,{name:df.name.trim(),desc:df.desc.trim(),venues:[]}]};
    setCustomDishes(next); lsSet('custom-dishes',next); setDF({name:'',desc:''}); setShowDF(false);
  }
  function removeDish(idx){
    const next={...customDishes,[city.id]:myDishes.filter((_,j)=>j!==idx)};
    setCustomDishes(next); lsSet('custom-dishes',next);
  }
  function toggleVenue(k){ const n={...eatDone,[k]:!eatDone[k]}; setEatDone(n); lsSet('eat-done',n); }
  function hideVenue(k){ const n={...eatHidden,[k]:true}; setEatHidden(n); lsSet('eat-hidden',n); }
  function restoreVenue(k){ const n={...eatHidden}; delete n[k]; setEatHidden(n); lsSet('eat-hidden',n); }
  const hiddenItems=Object.keys(eatHidden).filter(k=>eatHidden[k]&&k.startsWith(city.id+'-eat-')).map(k=>{
    const rest=k.slice((city.id+'-eat-').length); const [di,vi]=rest.split('-').map(Number);
    const dish=e.dishes[di]; const v=dish?.venues[vi];
    return v?{k,label:v.n,dish:dish.name}:null;
  }).filter(Boolean);
  const inp={width:"100%",padding:"8px 10px",borderRadius:7,border:`1px solid ${BORDER}`,
    fontSize:12,marginBottom:7,background:CARD,color:TXT,outline:"none",boxSizing:"border-box"};
  function VenueForm({k}){
    return <div style={{marginTop:8,padding:10,background:CARD,borderRadius:8,border:`1px solid ${BORDER}`}}>
      <input value={gvf(k).n} onChange={ev=>svf(k,'n',ev.target.value)} placeholder="Venue name *" style={inp}/>
      <input value={gvf(k).addr} onChange={ev=>svf(k,'addr',ev.target.value)} placeholder="Address (optional)" style={inp}/>
      <input value={gvf(k).note} onChange={ev=>svf(k,'note',ev.target.value)} placeholder="Notes (optional)" style={{...inp,marginBottom:8}}/>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>addVenue(k)} style={{flex:1,background:cc2,color:"#fff",border:"none",borderRadius:7,padding:"7px 0",fontSize:12,fontWeight:700,cursor:"pointer"}}>Add</button>
        <button onClick={()=>setShowVF(f=>({...f,[k]:false}))} style={{background:C2,color:MUT,border:`1px solid ${BORDER}`,borderRadius:7,padding:"7px 12px",fontSize:12,cursor:"pointer"}}>Cancel</button>
      </div>
    </div>;
  }
  return <div>
    <div style={{fontSize:12,color:"#555",lineHeight:1.7,marginBottom:18,
      borderLeft:`3px solid ${cc2}`,paddingLeft:12,fontStyle:"italic"}}>{e.headline}</div>

    {/* Built-in dish cards */}
    {e.dishes.map((d,i)=>{
      const vfKey='d'+i; const cvs=myVenues[vfKey]||[];
      return <div key={i} style={{marginBottom:18,background:C2,borderRadius:10,padding:14,border:`1px solid ${BORDER}`}}>
        <div style={{fontWeight:700,fontSize:14,color:TXT,marginBottom:5}}>{d.name}</div>
        <Tag color={cc2}>{d.origin}</Tag>
        <div style={{fontSize:12,color:"#555",margin:"10px 0",lineHeight:1.65}}>{d.story}</div>
        <SH label="Where exactly"/>
        {d.venues.map((v,j)=>{
          const k=city.id+'-eat-'+i+'-'+j; if(eatHidden[k]) return null;
          const tried=!!eatDone[k];
          return <div key={j} style={{marginBottom:8,paddingBottom:8,borderBottom:`1px solid ${BORDER}`,display:"flex",gap:8,alignItems:"flex-start"}}>
            <input type="checkbox" checked={tried} onChange={()=>toggleVenue(k)} style={{marginTop:3,accentColor:cc2,flexShrink:0,width:14,height:14}}/>
            <div style={{flex:1,opacity:tried?.5:1}}>
              <div style={{fontWeight:600,fontSize:12,color:tried?MUT:TXT,textDecoration:tried?"line-through":"none"}}>{v.n}</div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:1,flexWrap:"wrap"}}>
                <span style={{fontSize:11,color:MUT}}>{v.addr}</span>
                {v.addr&&<a href={mapsUrl(v.n,v.addr)} target="_blank" rel="noreferrer" style={{fontSize:10,color:PT,fontWeight:600,textDecoration:"none"}}>芒聠聴 Maps</a>}
              </div>
              <div style={{fontSize:11,color:"#777",marginTop:3,fontStyle:"italic"}}>{v.ctx}</div>
            </div>
            <button onClick={()=>hideVenue(k)} style={{background:"none",border:"none",color:BORDER,cursor:"pointer",fontSize:18,lineHeight:1,padding:"0 4px",flexShrink:0}} title="Remove">脙聴</button>
          </div>;
        })}
        {cvs.map((cv,j)=>(
          <div key={'cv'+j} style={{marginBottom:8,paddingBottom:8,borderBottom:`1px solid ${BORDER}`,display:"flex",gap:8,alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:12,color:TXT}}>{cv.n}</div>
              {cv.addr&&<div style={{display:"flex",alignItems:"center",gap:8,marginTop:1}}>
                <span style={{fontSize:11,color:MUT}}>{cv.addr}</span>
                <a href={mapsUrl(cv.n,cv.addr)} target="_blank" rel="noreferrer" style={{fontSize:10,color:PT,fontWeight:600,textDecoration:"none"}}>芒聠聴 Maps</a>
              </div>}
              {cv.note&&<div style={{fontSize:11,color:"#777",marginTop:3,fontStyle:"italic"}}>{cv.note}</div>}
            </div>
            <button onClick={()=>removeCustomVenue(vfKey,j)} style={{background:"none",border:"none",color:MUT,cursor:"pointer",fontSize:18,lineHeight:1,padding:"0 4px",flexShrink:0}}>脙聴</button>
          </div>
        ))}
        {showVF[vfKey]?<VenueForm k={vfKey}/>:(
          <button onClick={()=>setShowVF(f=>({...f,[vfKey]:true}))}
            style={{marginTop:8,width:"100%",background:"none",border:`1px dashed ${cc2}66`,color:cc2,borderRadius:6,padding:"5px 0",fontSize:11,fontWeight:600,cursor:"pointer"}}>+ Add a venue here</button>
        )}
      </div>;
    })}

    {/* Pork compass */}
    <div style={{background:"#FFF8EE",border:`1px solid ${WRN}44`,borderRadius:10,padding:12,marginTop:4}}>
      <div style={{fontSize:10,fontWeight:700,color:WRN,marginBottom:5,letterSpacing:.5}}>冒聼搂颅 PORK COMPASS</div>
      <div style={{fontSize:12,color:"#666",lineHeight:1.55}}>{e.porkCompass}</div>
    </div>

    {/* Custom dish cards */}
    {myDishes.map((d,di)=>{
      const vfKey='cd'+di;
      return <div key={di} style={{marginTop:14,background:C2,borderRadius:10,padding:14,border:`1px solid ${BORDER}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5}}>
          <div style={{fontWeight:700,fontSize:14,color:TXT}}>{d.name}</div>
          <button onClick={()=>removeDish(di)} style={{background:"none",border:"none",color:MUT,cursor:"pointer",fontSize:18,lineHeight:1,padding:"0 4px"}}>脙聴</button>
        </div>

function BudgetTab({trip,city,actualSpend,setActualSpend}){
  const cc2=cityColor(trip,city);
  const cc=city.cityCost;

  // DIY trips: cities have no cost estimate 芒聙聰 show a simple "what did you spend" tracker.
  if(!cc){
    return <div>
      <div style={{background:C2,borderRadius:10,padding:14,border:`1px solid ${BORDER}`}}>
        <div style={{fontSize:9,color:MUT,letterSpacing:.5,textTransform:"uppercase",marginBottom:10}}>Actual spend</div>
        <div style={{display:"flex",alignItems:"center",gap:4,background:CARD,
          borderRadius:7,border:`1px solid ${BORDER}`,padding:"6px 12px",width:"fit-content"}}>
          <span style={{fontSize:13,color:MUT,fontWeight:600}}>$</span>
          <input type="number" inputMode="decimal" placeholder="0"
            value={actualSpend[city.id]??''}
            onChange={ev=>{const v=ev.target.value;const next={...actualSpend,[city.id]:v===''?null:Number(v)};
              setActualSpend(next); lsSet('actual-spend',next);}}
            style={{width:90,border:"none",background:"transparent",fontSize:15,
              fontWeight:700,color:TXT,outline:"none",WebkitAppearance:"none"}}/>
        </div>
        <div style={{fontSize:11,color:MUT,marginTop:8}}>Track what you actually spend in {city.name}.</div>
      </div>
    </div>;
  }

  const CITIES=trip.cities.filter(c=>c.cityCost);
  const maxCity=Math.max(...CITIES.map(c=>c.cityCost.total),1);
  const sorted=[...CITIES].sort((a,b)=>a.cityCost.total-b.cityCost.total);
  const rank=sorted.findIndex(c=>c.id===city.id)+1; // 1 = cheapest
  const nights=parseInt(city.duration)||0;
  const perDay=nights>1?(cc.total/nights).toFixed(0):null;
  const cats=[
    {l:"Accommodation",v:cc.accom,c:"#4A90E2"},
    {l:"Food",v:cc.food,c:GRN},
    {l:"Local transport",v:cc.local,c:"#9B59B6"},
    {l:"Intercity",v:cc.intercity,c:"#E07B39"},
  ].filter(x=>x.v>0);

  return <div>
    {/* Hero total */}
    <div style={{background:C2,borderRadius:12,padding:18,marginBottom:16,
      border:`1px solid ${BORDER}`}}>
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",
        flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontSize:9,color:MUT,letterSpacing:.5,textTransform:"uppercase",marginBottom:4}}>
            Estimated spend
          </div>
          <div style={{fontSize:36,fontWeight:900,color:TXT,lineHeight:1}}>${cc.total.toFixed(0)}</div>
          <div style={{fontSize:11,color:MUT,marginTop:4}}>{city.duration}</div>
        </div>
        <div style={{textAlign:"right"}}>
          {perDay&&<div>
            <div style={{fontSize:9,color:MUT,letterSpacing:.5,textTransform:"uppercase",marginBottom:2}}>Per day</div>
            <div style={{fontSize:22,fontWeight:800,color:cc2}}>${perDay}</div>
          </div>}
          <div style={{marginTop:8}}>
            <div style={{fontSize:9,color:MUT,letterSpacing:.5,textTransform:"uppercase",marginBottom:2}}>Route rank</div>
            <div style={{fontSize:13,fontWeight:700,color:rank<=3?GRN:rank>=8?ES:WRN}}>
              {rank<=3?"冒聼聮職":rank>=8?"冒聼聰麓":"冒聼聼隆"} #{rank} of {CITIES.length} cities
            </div>
            <div style={{fontSize:9,color:MUT}}>{rank<=3?"budget-friendly":rank>=8?"higher spend":"mid-range"}</div>
          </div>
        </div>
      </div>
    </div>

    {/* Actual spend tracker */}
    <div style={{background:C2,borderRadius:10,padding:14,marginBottom:16,border:`1px solid ${BORDER}`}}>
      <div style={{fontSize:9,color:MUT,letterSpacing:.5,textTransform:"uppercase",marginBottom:10}}>Actual spend</div>
      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:4,background:CARD,
          borderRadius:7,border:`1px solid ${BORDER}`,padding:"6px 12px"}}>
          <span style={{fontSize:13,color:MUT,fontWeight:600}}>$</span>
          <input type="number" inputMode="decimal"
            placeholder={cc.total.toFixed(0)}
            value={actualSpend[city.id]??''}
            onChange={ev=>{
              const v=ev.target.value;
              const next={...actualSpend,[city.id]:v===''?null:Number(v)};
              setActualSpend(next); lsSet('actual-spend',next);
            }}
            style={{width:72,border:"none",background:"transparent",fontSize:15,
              fontWeight:700,color:TXT,outline:"none",WebkitAppearance:"none"}}/>
        </div>
        {actualSpend[city.id]!=null&&(()=>{
          const diff=actualSpend[city.id]-cc.total;
          const over=diff>0;
          return <div style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:14,fontWeight:800,color:over?ES:GRN}}>
              {over?'芒聳虏':'芒聳录'} ${Math.abs(diff).toFixed(0)}
            </span>
            <span style={{fontSize:10,color:MUT}}>{over?'over':'under'} estimate</span>
          </div>;
        })()}
        {actualSpend[city.id]==null&&
          <span style={{fontSize:11,color:MUT}}>Enter what you actually spent</span>}
      </div>
    </div>

    {/* Stacked bar breakdown */}
    <div style={{marginBottom:16}}>
      <div style={{fontSize:9,color:MUT,letterSpacing:.5,textTransform:"uppercase",marginBottom:8}}>Where the money goes</div>
      <div style={{display:"flex",height:12,borderRadius:6,overflow:"hidden",background:"#eee",marginBottom:8}}>
        {cats.map(cat=>(
          <div key={cat.l} title={`${cat.l}: $${cat.v}`}
            style={{background:cat.c,width:`${(cat.v/cc.total)*100}%`,transition:"width .2s"}}/>

      <div style={{display:"flex",flexWrap:"wrap",gap:"8px 16px"}}>
        {cats.map(cat=>(

            <div style={{fontSize:11,color:TXT}}>{cat.l}</div>
            <div style={{fontSize:11,fontWeight:700,color:cat.c}}>${cat.v}</div>
          </div>
        ))}
      </div>
    </div>

    {/* All-cities comparison */}
    <div style={{marginBottom:16}}>
      <div style={{fontSize:9,color:MUT,letterSpacing:.5,textTransform:"uppercase",marginBottom:8}}>
        vs. rest of the route
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {sorted.map(c=>{
          const isThis=c.id===city.id;
          const cc3=c.country==="pt"?PT:ES;
          return(
            <div key={c.id} style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:68,fontSize:isThis?11:9,fontWeight:isThis?700:400,
                color:isThis?cc2:MUT,textAlign:"right",flexShrink:0,whiteSpace:"nowrap"}}>
                {c.name}
              </div>
              <div style={{flex:1,background:"#eee",borderRadius:4,height:isThis?10:7,overflow:"hidden"}}>
                <div style={{
                  background:isThis?cc2:BORDER,
                  width:`${(c.cityCost.total/maxCity)*100}%`,
                  height:"100%",borderRadius:4,transition:"width .2s"
                }}/>
              </div>
              <div style={{width:36,fontSize:isThis?11:9,fontWeight:isThis?700:400,
                color:isThis?cc2:MUT,flexShrink:0}}>${c.cityCost.total.toFixed(0)}</div>
            </div>
          );
        })}
      </div>
    </div>

    {/* Budget hack */}
    {(trip.budgetHacks||{})[city.id]&&<div style={{background:"#F0F7FF",border:`1px solid ${PT}33`,borderRadius:10,padding:14}}>
      <div style={{fontSize:10,fontWeight:700,color:PT,marginBottom:6,letterSpacing:.5}}>
        冒聼聮隆 BUDGET HACK
      </div>
      <div style={{fontSize:12,color:"#444",lineHeight:1.65}}>{trip.budgetHacks[city.id]}</div>
    </div>}
  </div>;
}

function LogisticsTab({city,stayDone,setStayDone,stayHidden,setStayHidden}){
  const s=city.stay; const m=city.move;
  const cc2=city.country==="pt"?PT:ES;
  const [showRemovedStay,setShowRemovedStay]=useState(false);
  function toggleStay(key){
    const next={...stayDone,[key]:!stayDone[key]};
    setStayDone(next); lsSet('stay-done',next);
  }
  function hideStay(key){
    const next={...stayHidden,[key]:true}; setStayHidden(next); lsSet('stay-hidden',next);
  }
  return <div>
    <SH label="Where to stay"/>
    {s.options.length>0 ? <>
      <div style={{fontSize:12,color:"#555",marginBottom:14,lineHeight:1.6}}>{s.note}</div>
      <div style={{fontSize:10,fontWeight:600,color:MUT,marginBottom:10}}>Best area: {s.area}</div>
      {s.options.map((o,i)=>{
        const key=city.id+'-stay-'+i;
        if(stayHidden[key]) return null;
        const booked=!!stayDone[key];
        return(
          <div key={i} style={{marginBottom:10,paddingBottom:10,borderBottom:`1px solid ${BORDER}`,
            display:"flex",gap:10,alignItems:"flex-start"}}>
            <input type="checkbox" checked={booked} onChange={()=>toggleStay(key)}
              style={{marginTop:3,accentColor:GRN,flexShrink:0,width:14,height:14}}/>
            <div style={{flex:1,opacity:booked?.5:1}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontWeight:600,fontSize:13,color:booked?MUT:TXT,
                  textDecoration:booked?"line-through":"none"}}>{o.n}</span>
                {booked&&<span style={{fontSize:9,background:GRN+"15",color:GRN,
                  padding:"1px 6px",borderRadius:3,fontWeight:700,border:`1px solid ${GRN}33`}}>BOOKED</span>}
              </div>
              <div style={{fontSize:11,color:MUT,marginTop:2}}>{o.area} 脗路 {o.price}</div>
              <div style={{fontSize:11,color:"#777",marginTop:3,fontStyle:"italic"}}>{o.tip}</div>
            </div>
            <button onClick={()=>hideStay(key)}
              style={{background:"none",border:"none",color:BORDER,cursor:"pointer",
                fontSize:18,lineHeight:1,padding:"0 4px",flexShrink:0}}
              title="Remove">脙聴</button>
          </div>
        );
      })}
      {s.tax!=="None"&&<div style={{fontSize:11,color:WRN,marginTop:4,fontWeight:600}}>芒職聽 Tourist tax: {s.tax}</div>}
    </> : <div style={{fontSize:12,color:"#666",lineHeight:1.65,marginBottom:4}}>{s.note}</div>}
    {(()=>{
      const hidden=s.options.map((o,i)=>({k:city.id+'-stay-'+i,label:o.n})).filter(x=>stayHidden[x.k]);
      if(!hidden.length) return null;
      return <div style={{marginTop:10,marginBottom:6}}>
        <button onClick={()=>setShowRemovedStay(o=>!o)}
          style={{display:"flex",justifyContent:"space-between",alignItems:"center",
            width:"100%",background:C2,border:`1px solid ${BORDER}`,borderRadius:8,
            padding:"8px 12px",cursor:"pointer",fontSize:12,color:MUT,fontWeight:600}}>
          <span>Removed stays ({hidden.length})</span><span>{showRemovedStay?'芒聳虏':'芒聳录'}</span>
        </button>
        {showRemovedStay&&<div style={{marginTop:6,background:C2,borderRadius:10,padding:12,border:`1px solid ${BORDER}`}}>
          {hidden.map(({k,label})=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"7px 0",borderBottom:`1px solid ${BORDER}`}}>
              <span style={{fontSize:12,color:MUT}}>{label}</span>
              <button onClick={()=>{const n={...stayHidden};delete n[k];setStayHidden(n);lsSet('stay-hidden',n);}}
                style={{background:GRN,color:"#fff",border:"none",borderRadius:6,padding:"4px 10px",
                  fontSize:11,fontWeight:700,cursor:"pointer"}}>Restore</button>
            </div>
          ))}
        </div>}
      </div>;
    })()}

    {/* Move */}
    <SH label="Getting around"/>
    {[["芒聠聮 Getting in",m.in],["芒聠聮 Moving on",m.out],["Local transport",m.local],["Estimated cost",m.cost]].map(([l,v])=>(
      <div key={l} style={{marginBottom:12,paddingBottom:12,borderBottom:`1px solid ${BORDER}`}}>
        <div style={{fontSize:10,fontWeight:700,color:MUT,marginBottom:4,textTransform:"uppercase",letterSpacing:.5}}>{l}</div>
        <div style={{fontSize:12,color:"#555",lineHeight:1.6}}>{v}</div>
      </div>
    ))}
  </div>;
}

function NotesTab({city,customNotes,setCustomNotes}){
  const cc2=city.country==="pt"?PT:ES;
  const [text,setText]=useState('');
  const myNotes=customNotes[city.id]||[];
  function addNote(){
    if(!text.trim()) return;
    const next={...customNotes,[city.id]:[...myNotes,text.trim()]};
    setCustomNotes(next); lsSet('custom-notes',next);
    setText('');
  }
  function removeNote(idx){
    const next={...customNotes,[city.id]:myNotes.filter((_,j)=>j!==idx)};
    setCustomNotes(next); lsSet('custom-notes',next);
  }
  return <div>
    <div style={{background:C2,borderRadius:10,padding:14,border:`1px solid ${BORDER}`}}>
      <div style={{fontSize:10,fontWeight:700,color:cc2,textTransform:"uppercase",
        letterSpacing:.5,marginBottom:8}}>Local Insight</div>
      <div style={{fontSize:12,color:"#555",lineHeight:1.75}}>{city.note}</div>
    </div>
    {city.warn&&(
      <div style={{background:"#FFF8EE",border:`1px solid ${WRN}55`,borderRadius:10,
        padding:12,marginTop:12}}>
        <div style={{fontSize:12,color:WRN,lineHeight:1.55,fontWeight:500}}>{city.warn}</div>
      </div>
    )}

    {/* Personal notes */}
    <div style={{marginTop:16}}>
      <SH label="My Notes"/>
      {myNotes.length>0&&myNotes.map((n,idx)=>(
        <div key={idx} style={{display:"flex",gap:8,alignItems:"flex-start",
          marginBottom:8,paddingBottom:8,borderBottom:`1px solid ${BORDER}`}}>
          <div style={{flex:1,fontSize:12,color:TXT,lineHeight:1.65,whiteSpace:"pre-wrap"}}>{n}</div>
          <button onClick={()=>removeNote(idx)}
            style={{background:"none",border:"none",color:MUT,cursor:"pointer",
              fontSize:18,lineHeight:1,padding:"0 4px",flexShrink:0}}>脙聴</button>

      <div style={{background:C2,borderRadius:10,padding:14,border:`1px solid ${BORDER}`}}>
        <div style={{fontSize:10,fontWeight:700,color:cc2,textTransform:"uppercase",
          letterSpacing:.5,marginBottom:10}}>+ Add a note</div>
        <textarea value={text} onChange={e=>setText(e.target.value)}
          placeholder="Type anything 芒聙聰 a tip, a reminder, a reservation number芒聙娄"
          rows={3}
          style={{width:"100%",padding:"8px 10px",borderRadius:7,border:`1px solid ${BORDER}`,
            fontSize:12,background:CARD,color:TXT,outline:"none",resize:"vertical",
            fontFamily:"inherit",lineHeight:1.5,marginBottom:8,boxSizing:"border-box"}}/>
        <button onClick={addNote}
          style={{background:cc2,color:"#fff",border:"none",borderRadius:7,padding:"9px 0",
            fontSize:12,fontWeight:700,cursor:"pointer",width:"100%"}}>Save note</button>
      </div>
    </div>
  </div>;
}

function loadUserTrips(){ return ls('trips',[]); }
function saveUserTrips(arr){ lsSet('trips',arr); }
function allTrips(){ return [...BUILTIN_TRIPS, ...loadUserTrips()]; }
function tripStatus(trip,overrides){
  const ov=(overrides||{})[trip.id];
  if(ov==="past"||ov==="upcoming") return ov;
  if(!trip.startDate) return "upcoming";
  const start=new Date(trip.startDate+"T00:00:00");
  const end=new Date(start.getTime()+((trip.days||1)-1)*86400000);
  const today=new Date(); today.setHours(0,0,0,0);
  if(today>end) return "past";
  if(today>=start&&today<=end) return "current";
  return "upcoming";
}
function fmtRange(trip){
  if(!trip.startDate) return "Dates not set";
  const start=new Date(trip.startDate+"T00:00:00");
  const end=new Date(start.getTime()+((trip.days||1)-1)*86400000);
  const m1=MNAMES[start.getMonth()], m2=MNAMES[end.getMonth()];
  if(m1===m2) return `${m1} ${start.getDate()}芒聙聯${end.getDate()}, ${end.getFullYear()}`;
  return `${m1} ${start.getDate()} 芒聙聯 ${m2} ${end.getDate()}, ${end.getFullYear()}`;
}

        <button disabled={!canSave} onClick={()=>onCreate(build())}
          style={{width:"100%",background:canSave?GRN:BORDER,color:"#fff",border:"none",borderRadius:10,
            padding:"13px",fontSize:14,fontWeight:800,cursor:canSave?"pointer":"default"}}>
          Create trip
        </button>
      </div>
    </div>
  );
}

// 芒聰聙芒聰聙芒聰聙 SETTINGS: BACKUP & RESTORE 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function SettingsView({onBack,onChanged}){
  const isMobile=useWindowWidth()<640;
  const [msg,setMsg]=useState("");
  function backup(){
    const data={}; for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i); data[k]=localStorage.getItem(k);}
    const blob=new Blob([JSON.stringify({app:"my-trips",exported:new Date().toISOString(),data},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob); const a=document.createElement("a");
    a.href=url; a.download="my-trips-backup-"+new Date().toISOString().slice(0,10)+".json";
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    setMsg("Backup downloaded.");
  }
  function restore(ev){
    const file=ev.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=()=>{
      try{
        const parsed=JSON.parse(reader.result); const data=parsed.data||parsed;
        Object.keys(data).forEach(k=>localStorage.setItem(k,data[k]));
        setMsg("Restored. Reloading芒聙娄"); onChanged&&onChanged();
        setTimeout(()=>window.location.reload(),700);
      }catch(e){ setMsg("That file couldn't be read."); }
    };
    reader.readAsText(file);
  }
  const card={background:CARD,border:`1px solid ${BORDER}`,borderRadius:16,padding:18,marginBottom:14,boxShadow:"0 2px 10px rgba(0,0,0,.04)"};
  const btn={width:"100%",border:"none",borderRadius:11,padding:"13px",fontSize:14,fontWeight:700,cursor:"pointer"};
  return(
    <div className="screen-in" style={{fontFamily:"inherit",background:BG,minHeight:"100vh",color:TXT}}>
      <div style={{position:"sticky",top:0,zIndex:50,background:"rgba(255,255,255,.86)",
        backdropFilter:"saturate(180%) blur(12px)",WebkitBackdropFilter:"saturate(180%) blur(12px)",
        borderBottom:`1px solid ${BORDER}`,padding:"calc(10px + var(--safe-top)) 14px 10px",
        display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onBack} style={{width:38,height:38,borderRadius:12,background:C2,
          border:`1px solid ${BORDER}`,color:TXT,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <Icon name="back" size={20} color={TXT}/>
        </button>
        <div style={{fontWeight:800,fontSize:17}}>Settings</div>
      </div>
      <div style={{maxWidth:480,margin:"0 auto",padding:isMobile?"18px 16px 40px":"24px"}}>
        <div style={card}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:6}}>Backup your trips</div>
          <div style={{fontSize:12,color:MUT,lineHeight:1.6,marginBottom:12}}>
            Saves all your trips and progress to a file. Keep it safe 芒聙聰 you can restore it on a new phone.
          </div>
          <button onClick={backup} style={{...btn,background:GRN,color:"#fff"}}>芒卢聡 Backup to file</button>
        </div>
        <div style={card}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:6}}>Restore from a backup</div>
          <div style={{fontSize:12,color:MUT,lineHeight:1.6,marginBottom:12}}>
            Loads a backup file. This replaces matching data on this device.
          </div>
          <label style={{...btn,background:PT,color:"#fff",display:"block",textAlign:"center"}}>
            芒卢聠 Choose backup file
            <input type="file" accept="application/json,.json" onChange={restore} style={{display:"none"}}/>
          </label>
        </div>
        {msg&&<div style={{fontSize:12,color:GRN,fontWeight:600,textAlign:"center",marginTop:4}}>{msg}</div>}
      </div>
    </div>
  );
}

// 芒聰聙芒聰聙芒聰聙 ROOT APP (multi-trip shell) 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function App(){
  const [view,setView]=useState("home");      // "home" | "trip" | "create" | "settings"
  const [tripId,setTripId]=useState(null);
  const [overrides,setOverrides]=useState(()=>ls('trip-overrides',{}));
  const [tick,setTick]=useState(0);            // bump to re-read user trips after create/restore

  const trips=allTrips();
  const current=trips.find(t=>t.id===tripId);

  function openTrip(id){ ACTIVE_TRIP=id; lsSet('last-trip',id); setTripId(id); setView("trip"); }
  function goHome(){ ACTIVE_TRIP=""; setView("home"); }

  if(view==="trip"&&current){ ACTIVE_TRIP=current.id; return <TripView key={current.id} trip={current} onHome={goHome}/>; }
  if(view==="create") return <CreateTrip onCancel={goHome} onCreate={(t)=>{
    const arr=loadUserTrips(); arr.push(t); saveUserTrips(arr); setTick(tick+1); openTrip(t.id);
  }}/>;
  if(view==="settings") return <SettingsView onBack={goHome} onChanged={()=>setTick(tick+1)}/>;
  return <TripsHome trips={trips} overrides={overrides}
    onOpen={openTrip} onNew={()=>setView("create")} onSettings={()=>setView("settings")}
    onArchiveToggle={(id,status)=>{const n={...overrides,[id]:status}; setOverrides(n); lsSet('trip-overrides',n);}}
    onDelete={(id)=>{const arr=loadUserTrips().filter(t=>t.id!==id); saveUserTrips(arr); setTick(tick+1);}}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
